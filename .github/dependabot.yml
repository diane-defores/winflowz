version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      expo-sdk:
        patterns:
          - expo
          - expo-*
          - "@expo/*"
      react-native:
        patterns:
          - react
          - react-native
          - react-native-*

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
